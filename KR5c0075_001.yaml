front:
  text: 道德直經新注卷之一
  hash: sha256:7f9edee603e5fb99b318ec6d78c13c3833006bcf24fb9933af935cfb5f54cadc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0075_HFL_001-001a, image: hfl/0375/0375-008.png}
body:
  text: 李約注道經上自然之性靜故天地萬物生生久而凌替修之令反自然故曰道凡三十七章道可道可道者非至道也非常道謂惟恍惟惚也名可名可名者物之質也非常名謂曰大曰逝也無名天地之始此上明道之精妙趨於言説離於名稱道生天地之初未有人未有人即誰強名道有名萬物之母三才既具品物流形含育之義明母子之名立聖人自此而垂教常無欲以觀其妙常有欲以觀其僥僥邊也人之大端不出於有欲與無欲也故有欲者不遊乎道中而忘懷者獨見夫精妙此兩者同出而異名在道則一為物則二同謂之玄玄黑也夫五色置於晦冥之中則無辨矣能使異名為造一可謂乎玄中玄玄之又玄愈玄愈不可測衆妙之門夫如是方可達於萬化出入之所由天下有天下之主也皆知美之為美斯惡已若所美與衆同豈非惡已皆知善之為善斯不善已若所善與衆異則誠不善也故有無之相生對而生也難易之相成迭相成也長短之相形並可見也高下之相傾起交爭也音聲之相和不獨為也前後之相隨殊不定也此皆效上之驗是以聖人必不與前言同處無為之事置心於清靜中行不言之教正身以率下也萬物作而不辭不擾故不失業謂自得故不謝生而不有使生成者我之力也我何有是力乎為而不恃得云為者我之功也我何恃此功矣功成而不居其不欲見賢也夫唯不居是以不去無心而理是謂不居而功自成是謂不去不尚賢使民不爭夫能不尚己賢孰與我爭不貴難得之貨使民不為盜若以不貪為寶則下皆化之又何人為盜也不見可欲使心不亂凡與我對者無不忘之則心必自靜是以聖人具下句也虛其心外物不復入於內也實其腹元和不復出於外也弱其志專思柔也強其骨能保精也常使人無知無欲其理如此故人化之皆復於朴使夫知者不敢為也令見反朴者而思齊焉為無為則無不治為不失於無為則不患於不理道沖而用之虛己以應物也或不盈故功德滿時也淵兮似萬物之宗淵然深靜不可測知故似為庶類之宗師挫其鋭能抑進取解其紛善釋讎嫌和其光參其明也同其塵入其暗也湛兮似或存用無不同性無所雜吾不知誰之子但識其能莫知其父象帝之先帝生物之主也群化皆處其後唯道能居其先象似也道性謙故不言定處其先而云似天地不仁仁恩也夫恩生乎心天地無心焉得恩以萬物為芻狗芻草也夫報起乎情芻狗無情焉得報聖人不仁聖人法天地之無心但虛懷而在士則何仁之有乎以百姓為芻狗百姓象芻狗之無情遂忘帝力於其下耳天地之間其猶橐籥橐無底曰橐爐錘之家用鼓風籥笛之類伶倫之人吹之以為之樂二者皆虛中無情所以應求不倦天地如之所以不仁也虛而不屈屈窮也虛故不窮也動而愈出故愈動而愈應多言數窮不如守中有心而言則有時而竭虛中而應則無日而窮谷神不死谷中虛則能以響答聲不知答聲者誰哉既不知而不測謂之神乎神答長在不死何也人能虛心則物無不應如神不離身而長存也是謂玄牝玄者幽暗也牝女子也女子處幽閨之中是謂玄牝此玄牝性柔而靜不以外傷內所以能制不測之神於身也又玄鼻牝口也空虛吐納元氣為陰陽之根玄牝之門是謂天地根行如玄牝可謂得道之門既得道矣則道為天地之根綿綿若存道體微妙綿綿似不能自持要今古常在用之不勤雖微妙若其應用也未嘗辭倦人能得之則性全神王致無期之壽又言吐納之道也天長地久今市未始無之天地所以能長且久者以其不自生故能長生所以長生以其不營養其生而得之是以聖人是能法天地者後其身而身先所以先於人者由善退而致也外其身而身存所以不殆者為能自薄也非以其無私故能成其私夫能不私於己而私於人人之私未必成而己之私已成矣上善若水至善人如水性水善利萬物物莫不蒙其潤而不爭善委順也處衆人之所惡夫下流者天下之惡歸焉人皆避之水獨處之故幾於道幾近也居善地靜居則善於地心善淵澄心則善於淵與善仁施與則善於仁言善信赴言則善於信政善治為政則善於理事善能行事則善於能動善時運動則善於時夫惟不爭故無尤尤過也水性若此善人如之是以處無過之地也持而盈之不如其已持滿者鮮能不傾未若止而居中已止也揣而鋭之不可長保磨而至鋭保其不折未之前聞揣磨也鋭薄也金玉滿堂莫之能守賈害者寶積必殺身孰云能守富貴而驕自遺其咎位高而倨患自掇也豈得尤人功成事遂身退天之道夫為功而功成圖事而事遂則當退身不處亢極是合天道虧盈也載營魄抱一能無離乎人之生也必載魂魂是陽神陽神欲人生魄是陰鬼陰鬼欲人死故老子教人營衛之法不使妄出搆禍也營衛之法無過抱一一專一也抱專一之心魄故無由離身合於前境也專氣致柔能如嬰兒乎能專養和氣至四體之柔弱似嬰兒乎滌除玄覽能無疵乎玄覽心也心靈通雖幽遠亦能覽而知之人皆多欲役之無度遂生瑕穢不能照燭故令以道洗滌除其塵纍也愛民治國能無為乎夫身修者未聞其國不理也民者國之本也無為者理之要也若得理之要以臨其國是謂愛民而理國也天門開闔能為雌乎天輔有德而愛民之君守雌用靜動不離道故天門長開授其福祚不者闔矣明白四達能無知乎有至德如日無所不燭能令群下不知之乎生而不有有則下知也為而不恃恃則非聖人也長而不宰物不知謝生之所也是謂玄德冥運之至三十輻共一轂當其無有車之用厥初為車則以椎為輪不三十輻則不可以轉行也車之利用當廂中之無也因其用無以成運動埏埴以為器當其無有器之用古者為器則合士而陶之甌盎成焉故有器之用亦藉中無也因其用無節其飲食鑿户牖以為室當其無有室之用當營窟之時則斬陵阜而為室鑿户以出入開牖以通明人得居中中無故也因其用無警其凝滯故有之以為利有形之物資空無以為利無之以為用虛無之道託器質而昭用五色令人目盲久而視之則熒然無見故若盲五音令人耳聾聽之移時則昏然無聞故若聾五味令人口爽咀之不輟則差然無别故若爽馳騁田獵令人心發狂奔逐狐兔困不暇息故若心之發狂也難得之貨令人行妨沒命求於重寶無因進德故行妨是以聖人引聖人之行以抑上五者上五者世人皆矻矻營逐曾不知退故以為腹之義以示之為腹不為目目無厭聖人不為腹知足聖人為之故去彼取此去目目視外故云彼取腹腹實內故云此寵辱若驚驚辱與寵同則無辱矣貴大患若身貴身與患一則無患矣何謂寵辱尊榮曰寵貶責曰辱寵為下辱因寵生故辱為上如汲黯積薪之義得之若驚恐辱將至失之若驚能思過也是謂寵辱若驚可為寵驚之相似何謂貴大患若身吾所以有大患者為吾有身貴厚其身則觸途憂患及吾無身吾有何患及不私其身忘其形遂失患之所在故貴以身為天下若可以寄天下貴身之人為君必求美服厚味則必竭生人之資人孰不怨共以天下寄之非久長也故愛以身為天下若可以託天下驚寵之人為天下主既愛其身則必防其辱不擾於人人無不親附共以天下託之託之者是抑與之也視之不見名曰夷目可以觀色不可覩道而視之者徒得其夷夷平也為漠漠然無異見聽之不聞名曰希耳可以聞聲不可以聆道而聽之者但得其希希無也亦少也或終身不得或亦得之搏之不得名曰微手可以執質不可以執道而搏之者只得其微微妙也倣佛似有追之又失此三者不可致詰故混而為一以上三者將窮於道竟無所得不若混而為一也其上不皎其下不昧凡物皆上明而下暗唯道高而無上故不皎卑而無下故不昧繩繩不可名復歸於無物繩繩者長遠不絶也及責其實而欲名之則復歸於無物也是謂無狀之狀既不可名信無狀矣而云之狀其故何哉明道雖非其狀誠能生於衆狀故云之狀也無物之象豈如物之形象可得而見是謂惚恍恍有也惚無也謂有不可謂無不可故以惚恍名之迎之不見其首無來時也隨之不見其後無去日也執古之道以御今之有雖非視聽可得又非尋摘所知自古有之謂之曰道今欲執守未聞其方方在虛心心誠能虛道將自至然後執之以御群有無不致理能知古始是謂道紀道為大古之始人能知而復行是謂得理化之綱紀古之善為士者説古昔之時有善以道為士者微妙玄通深不可識獨究至道盡其微妙墻仞高深不可窺測夫唯不可識故強為之容道在於心不形於色故人不可得識將欲化導故強為容容以悟物也豫若冬涉川方冬之時堅冰必至而涉川者固無慮於墊溺所以悅豫猶若畏四鄰雖處欲不染如涉冬川猶懼迹生切自韜晦如逃難者恐四鄰知之儼若客其無為也如客之儼然也涣若冰之將釋復不凝滯如沐之泮也敦兮其若朴又恐流而不反將思復於本者曠兮其若谷如谷虛容渾兮其若濁不獨清也孰能濁以靜之徐清唯善士也孰能安以久動之徐生不安於安次來次滅善士之道也歸此道者不欲盈盈則失之夫唯不盈故能弊不新成唯不盈者故能弊其所新致虛極守靜篤篤厚也將欲求道集於身者必須先致其虛令虛至極則道必自至於身中矣萬物並作吾以觀其復恐人未信守靜是得道之由故以此喻明之萬物動作吾觀其搖落之後生氣無不歸於靜中也夫物藝藝皆復各歸其根夫物藝藝茂盛至秋秋冬之交生性未有不歸於根者為根靜故也歸根曰靜若動則不能更生也靜曰復命萬物至十月其氣皆歸於根冬至後乃一陽生方萌芽動也周而復始此自然之本也復命曰常常生之道知常曰明明故知也不知常妄作凶若昧於知常則所動皆妄必不能與吉會也知常容心虛則知常故能容衆也容乃公無所不容為無私也公乃王無私者物皆歸附也王乃天王道無偏如天之覆天乃道其功莫大又能忘之道乃久忘公之主福祚敢忌沒身不殆愛及甘棠洗其人乎言至人立功立事立言立法萬古不朽身謝而神存也道德真經新注卷之一
