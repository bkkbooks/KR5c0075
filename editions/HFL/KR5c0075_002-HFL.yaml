front:
  text: 道德眞經新註卷之二能二
  hash: sha256:0bad70794545bc0ad3606e9a1525328371315064f07ab28c5aaaa8a414f1bf70
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0075_HFL_002-001a, image: hfl/0375/0375-030.png}
body:
  text: 李約註道經下太上下知有之遠古之君民下知有之爾未嘗聞其令也其次親之譽之蒙德故親之沐仁故譽之其次畏之侮之直者畏之姦者侮之信不足有不信初以僞誘之是信不足也後以誠示之人亦不之信猶其貴言不知貴言賤信已至斯弊猶貴其言則淳和之風不可至也功成事遂百姓謂我自然由無教令是有此俗大道廢有仁義大道非欲避仁義而廢之而仁義立故大道不得不廢由時捨本崇末也智慧出有大僞智慧出非欲興大僞而大僞不得不興爲憑迹而生也六親不和有孝慈父慈子孝之日豈有曾參之名國家昏亂有忠臣君賢臣良之時焉有比干之節絶聖棄智民利百倍絶聖棄智則無法令無法令則民不憂其抵犯民不憂其抵犯則恣而爲生與其名韓之時而計其利不啻百倍絶仁棄義民復孝慈絶膻行之仁義則天下不奉不及之法皆復於自然孝慈絶巧棄利盜賊無有絶越常之巧則其利均其利均則民各足民各足則誰爲盜賊此三者以爲文未足故令有所屬屬繼也三者足以教君夫足以教民故更繼四句見素去染也抱樸守本也少私忘己也寡欲喪偶也絶學無憂若爲人間之學舉措皆有悔悋故憂之唯之與阿相去幾何唯阿同出於口便有喜怒之變善之與惡相去何若善惡同生於心豈有胡越之遠人之所畏不可不畏人之所畏者當須畏之若不畏則禍患立至荒兮其未央哉世人之學學皆如此則自然之性日向荒凉未有休止之勢也衆人熙熙殉欲之貌如享太牢貪可知也如登春臺增淫志也我獨怕兮其未兆如嬰兒之未孩老子云我於人間之學絶來已乆今縱見之情實怕然未有兆朕似嬰兒之未孩者未識人之意也乗乗兮若無所歸乗乗者乗其所乗也聖人無心所遇便乗之而往安知彼之與此而謂之歸衆人皆有餘於俗學皆似有餘力我獨若遺唯我於俗學則似神不足而遺忘我愚人之心也哉非也純純兮素朴未散故耳俗人察察騁嚴明也我獨悶悶似無能也俗人昭昭矜有知也我獨若昏若藏端也忽若海寂兮似獨所止如虚舟之泛泛兮在巨海之中未嘗有所止泊者也衆人皆有以是故不閑我獨頑似鄙我獨不知有人間之事其庸頑也如邊鄙之民我獨異於人形同人群心游物表而貴求食於母母道也食飼也我所以獨異於人者爲求飼於道也道亦以我能絶俗學故常以元和妙氣而飼之孔德之容唯道之從孔甚也容受也從順也其有德之人其心清虚唯容受至道從順而行之道之爲物唯恍唯惚道之爲物雖恍惚無常然惡煩雜而託清虚也惚兮恍兮其中有象惚無也恍有也其中者其中心也象罔象也若其心中從惚兮無物而爲恍兮有欲則其道化爲罔象也恍兮惚兮其中有物若其心中從恍兮有欲而能爲惚兮無欲則其道復化爲妙物湛然居於心中也窈兮冥兮其中有精窈深也冥暗也精道之妙也言道以精妙之氣出入於萬物之中莫見其朕唯虚心者能得之其精甚眞得不假之精遂成眞人也其中有信誠能虚心則精應不失也自古及今其名不去古猶今也今人虚感應其不失因知古之感者其應亦然也以閲衆甫閲尋閲也甫始也尋閲古始得道者衆矣一一皆以無欲而得之矣吾何以知衆甫之然以此老子曰我何以知得道之人如此以其上事而知之矣曲則全無所不順孰爲我害枉則直屈如不言終必自申窪則盈唯下下者天下歸心弊則新不重所得方能進修少則得不分其志多則惑好殉群方是以聖人抱一爲天下式唯守道而己天下不敢違不自見故明晦己能能必昭也不自是故彰亡己是是必著矣不自矜故長以短自與而長反歸不自伐故有功夫唯不居是以不去夫唯不爭天下莫能與之爭其行如前則無不伏古之所謂曲則全者豈虚言哉誠全而歸之但行之當自見其效希言自然愼言者不唯寡尤亦乃合自然之道也飄風不終朝驟雨不終日此二者傷物太甚故不可乆爲孰爲此者天地天地尚不能乆而况於人乎天地有形之至大者爲暴風疾雨損於物猶不敢乆爲而况至細之人而欲多言傷自然之氣乎故從事於道者希言者其人也道者同於道德者同於德失者同於失各以其類會也同於道者道亦得之同於德者德亦得之同於失者失亦得之同類相遇皆相得也信不足有不信不信希言合道而以多言獲戾則悔而求之雖發丹誠而從事於道之人亦不足信也跂者不立跂踵之長不堪持乆跨者不行跨闊其足安能致遠自見者不明自是者不彰自伐者無功自矜者不長由跂者跨者生自見等行是皆妄作且越天眞有一於身則爲人倫之棄物况兼之乎其於道也曰餘食贅行其可惡也如食之殘如形之剩肉也物或惡之故有道者不處凡庸之物猶或致嫌則有道之人固不留意於此有物混成先天地生元氣圓凝之時未有天地也寂兮寥兮至虚至靜獨立而不改不與物群復不隨物化也周行而不殆備行萬物之中又無時而危也可以爲天下母爲能生育吾不知其名無得而稱强字之曰道字以表德爲有生天生地之德故字道以表之强名之曰大名以召實爲其無所不包故名曰大以示於人人欲修之當有所謂矣大曰逝已不在大逝曰遠又逝處復失也遠曰返遠追之不獲俄然返於虚心也故道大天大地大王亦大王雖不得比於三大其爲大也亦次之域中有四大而王居其一焉道己下三大皆自道而生王已上三大皆令王法則人法地地地體靜載而生物法之者令與地同同地故云地地也法天天天德廣覆而無私法之者令與天同同天故云天天也法道道道性忘功法之者令與道同同道故云道道也法自然人能法三者皆與爲一始可稱王爾則爲萬人之中一人爾言地天道三者皆有自然妙理王者當法之爾自然理者是覆載生成皆不私也重爲輕根萬物莫不由根而生者爲根重也靜爲躁君故兆民未有不受制於君者爲君靜也是以君子行終日不離輜重君子欲有所詣必先備其輜重用防寒暑饑乏之患雖有榮觀燕處超然超然者超脱之貌也榮觀春臺也燕燕爾也治容之所也此皆守重靜者之能超脱者也奈何萬乗之主而以身輕天下物之與人皆守重靜如何天下之主不重其身輕其出入也輕則失臣輕其舉措則難服事故失臣心躁則失君躁其情性不自安靜則失其君位善行無轍迹行道無迹善言無瑕謫言道無謫善計不用籌算守清靜不假籌算善閉無關楗而不可開閉七竅諸門群魔不能入善結無繩約而不可解清五臟諸神外物不能誘是以聖人常善救人故無棄人常善救物故無棄物潜行如上之善道被草木而况人乎是謂襲明内行而外不見故善人不善人之師善人能以善與人也不善人善人之資資給也不善人是善人可資之物者也不貴其師不愛其資皆至於道遂相忘也雖知大迷是謂要妙忘師資俗以爲迷道以爲妙也知其雄守其雌爲天下谿有雄武之材而不用能雌伏以爲心則爲衆所歸如天下深谿也爲天下谿常德不離謙德不離其身則如谿爲百川所凑復歸於嬰兒和氣充具知其白守其黑爲天下式式者法也韜白如黑則天下之人罔敢不伏爲天下式常德不忒抱此晦用之德於身常無差失復歸於無極其德若此故福壽不可量知其榮守其辱爲天下谷以榮如辱則其量如谷無所不容納也爲天下谷常德乃足量無不容德無不備復歸於樸樸器之本也德備則能返本本道也樸散則爲器器周於用者道散則衆器成焉聖人用之則爲官長聖人用道居群材之上理化其不明道者故大制不割懷至道故能制服生靈當以無爲守之非加刑法也將欲取天下而爲之取天下之歡心吾見其不得已以有爲取之我見此必不得已已語助也天下神器不可爲也神器者人也身中居神所以謂之神器人性惡擾有爲則擾人故知不可以取天下爲者敗之爲之則民散也執者失之不信厚言固守本意則必失帝業故物或行或隨若行有爲於前必敗失隨其後或呴或吹仁德曰呴嚴刑曰吹或强或羸民安則强民散則羸或載或隳撫之則載虐之則隳是以聖人去甚去奢去泰有爲之驗若此之甚爲天下者惡得不去之哉以聖人之爲理則就其中去甚者奢者與泰者以道佐人主者不以兵强天下古善爲相者安民强國則以道不以兵其事好還剋敵之師師踵未還已爲所報師之所處荆棘生焉妨耕耨故荆棘是生大軍之後必有凶年戰伐之後殺氣猶凝冲和未行不産嘉穀也故善之果而已不敢以取强佐君合以道不合以兵必不得已則擇其善將者則必果敢不以好勝爲心也果而勿矜果而勿伐果而勿驕果而不得已是果而勿强若使善者將甲討難必定不矜不伐不驕何謂也爲果以謙不果以强强則違道物壯則老是謂不道物至壯則老兵至於强未必不敗皆爲不合道也不道早已知不合道能早止者善矣己止也夫隹兵者不祥之器隹好也兵五兵也兵爲害器隹好非善物或惡之故有道者不處物皆好生惡死有好兵之國凡物尚惡之况有道之士焉肯居其國也君子居則貴左君子體仁以長人居必貴於發生之位也用兵則貴右主兵者以殺爲志故用必貴於搖落之方兵者不祥之器非君子之器君子器以文德不以干戈不得已而用之非其器而用之蓋不得已也恬淡爲上所用之以止寇殊不得其滋味勝而不美以恬淡爲上故以勝爲不美而美之者是樂殺人樂愛也若以勝爲美則是愛殺人也夫樂殺人者不可得志於天下人咸惡死孰肯景附故吉事尚左凶事尚右各從其類偏將軍處左雖爲主殺之官而無主殺之權上將軍處右專於征伐言以喪禮處之依置柩之所殺人衆多以悲哀泣之君子爲將則曰我實無德民有何辜一朝殺傷殆至於死故興言而涕從也戰勝以喪禮處之使居其位不必衣其服一則順其殺氣二則抑用兵者之心也道常無名今謂之道是强名也樸雖小所以視之不見天下不敢臣懷其道尚爲王者師况敢以道爲臣妾者乎侯王若能守天下將自賔賔服也守道不忘則無遠不服天地相合以降甘露天地交泰能降甘露以旌侯王能守道也人莫之令而自均王道無偏故德澤平施豈待命令始制有名道至於此始可制服有名之物有名之物即山川可祭之神林泉可徵之士名亦既有如此有名之物有封禪而必從伏林泉而盡出朝見也夫亦將知止夫此輩亦將知安於所止知止所以不殆殆危也有名之物依於有道之君而安於樂士况百姓乎譬道之在天下猶川谷之與江海有道之主在於天下君臣道合上恩下流下情上達如川谷之與江海通流也知人者智智者不惑故知人也自知者明明者見於未萌故不履於非道勝人者有力人所以勝人者非有勢力即有膂力自勝者强能自修德以服人殊强於有力者知足者富若足於一瓢則富於萬國强行者有志行事始終如一是有志節矣不失其所者乆人而無常必不能乆行其道死而不亡者壽人能行道以利天下所垂法則制度皆生於神識機智一成之後萬古傳之是身死形謝而神長存故曰壽也大道泛兮其可左右大道泛泛兮不繫於一方而云可左可右者略舉兩端明備萬物萬物恃之以生而不辭生育之功成亦不名我有愛養萬物而不爲主主則非忘功也常無欲可名於小世人之無欲者赤子也而道於物無欲可是如赤子之小者乎萬物歸之而不爲主可名於大萬物悉歸於道道又不與爲主可是傲然爲大不顧於物者耶是以聖人終不爲大聖人法道法於爲小不法於爲大者恐失謙也故能成其大本無爲大之心翻成遠大之業執大象天下往大象道也未有一物不因道而爲形象若執此道以臨天下民無不歸往也往而不害安平泰既歸之當安之非清平之中泰然舒息不可也樂與餌過客止樂音樂也餌飲食也夫音樂飲食人之所欲豈有過之而不留止者乎道之出口淡乎其無味過客所以留止者以其有閲目實腹之物也此大象之道將出於口以告於人則淡之其無可味如何使人慕之且人性惡多事好無爲道性無爲故人欲之矣視之不足見聽之不足聞用之不可既既盡也雖視聽不足得其形聲必能用之亦無窮盡將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微眀此四者兆之初起可謂之微便能固其源而絶之萌也柔弱勝剛强夫禍之始生柔弱也終至茂盛剛强也將欲除之於柔弱之時則全勝於剛强之日魚不可脱於淵魚若脱於手而入於淵則不可得而制也國之利器不可以示人利器者機事也凡事機微之時則能制之不使至其强大此實理身理國之要道也必不得示諸小人若機落小人之手則何異夫魚之入淵乎道常無爲而無不爲爲而無心故能無所不爲也侯王若能守萬物將自化不失無爲則無不化化而欲作吾將鎮之以無名之樸無名之樸者無爲之本也夫無爲也則無跡當何名之君執此以鎮人人孰敢妄動者也無名之樸亦將不欲兼忘守道之心乃合自然之素不欲以靜天下將自正夫有心於靜者則無時而靜也今放之於自得我無一物於胸中然後君臣上下各正性命道德眞經新註卷之二
