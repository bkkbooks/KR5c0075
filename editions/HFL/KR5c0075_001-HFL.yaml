front:
  text: 道德直經新註卷之一
  hash: sha256:6e0a70e1c050786250d6769231796f97a4404ebcdd4204fb68ae05445830446e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0075_HFL_001-001a, image: hfl/0375/0375-008.png}
body:
  text: 李約註道經上自然之性靜故天地萬物生生乆而凌替修之令反自然故曰道凡三十七章道可道可道者非至道也非常道謂惟恍惟惚也名可名可名者物之質也非常名謂曰大曰逝也無名天地之始此上明道之精妙趨於言說離於名稱道生天地之初未有人未有人即誰强名道有名萬物之母三才既具品物流形含育之義明母子之名立聖人自此而垂教常無欲以觀其妙常有欲以觀其儌儌邊也人之大端不出於有欲與無欲也故有欲者不遊乎道中而忘懷者獨見夫精妙此兩者同出而異名在道則一爲物則二同謂之玄玄黑也夫五色置於晦冥之中則無辨矣能使異名爲造一可謂乎玄中玄玄之又玄愈玄愈不可測衆妙之門夫如是方可達於萬化出入之所由天下有天下之主也皆知美之爲美斯惡已若所美與衆同豈非惡已皆知善之爲善斯不善已若所善與衆異則誠不善也故有無之相生對而生也難易之相成迭相成也長短之相形並可見也高下之相傾起交爭也音聲之相和不獨爲也前後之相隨殊不定也此皆效上之驗是以聖人必不與前言同處無爲之事置心於清靜中行不言之教正身以率下也萬物作而不辭不擾故不失業謂自得故不謝生而不有使生成者我之力也我何有是力乎爲而不恃得云爲者我之功也我何恃此功矣功成而不居其不欲見賢也夫唯不居是以不去無心而理是謂不居而功自成是謂不去不尚賢使民不爭夫能不尚己賢孰與我爭不貴難得之貨使民不爲盜若以不貪爲寳則下皆化之又何人爲盜也不見可欲使心不亂凡與我對者無不忘之則心必自靜是以聖人具下句也虚其心外物不復入於内也實其腹元和不復出於外也弱其志專思柔也强其骨能保精也常使人無知無欲其理如此故人化之皆復於朴使夫知者不敢爲也令見反朴者而思齊焉爲無爲則無不治爲不失於無爲則不患於不理道冲而用之虚己以應物也或不盈故功德滿時也淵兮似萬物之宗淵然深靜不可測知故似爲庶類之宗師挫其鋭能抑進取解其紛善釋讎嫌和其光叅其明也同其塵入其暗也湛兮似或存用無不同性無所雜吾不知誰之子但識其能莫知其父象帝之先帝生物之主也群化皆處其後唯道能居其先象似也道性謙故不言定處其先而云似天地不仁仁恩也夫恩生乎心天地無心焉得恩以萬物爲芻狗芻草也夫報起乎情芻狗無情焉得報聖人不仁聖人法天地之無心但虚懷而在士則何仁之有乎以百姓爲芻狗百姓象芻狗之無情遂忘帝力於其下耳天地之間其猶橐籥橐無底曰橐鑪錘之家用鼓風籥笛之類伶倫之人吹之以爲之樂二者皆虚中無情所以應求不倦天地如之所以不仁也虚而不屈屈窮也虚故不窮也動而愈出故愈動而愈應多言數窮不如守中有心而言則有時而竭虚中而應則無日而窮谷神不死谷中虚則能以響答聲不知答聲者誰哉既不知而不測謂之神乎神答長在不死何也人能虚心則物無不應如神不離身而長存也是謂玄牝玄者幽暗也牝女子也女子處幽閨之中是謂玄牝此玄牝性柔而靜不以外傷内所以能制不測之神於身也又玄鼻牝口也空虚吐納元氣爲陰陽之根玄牝之門是謂天地根行如玄牝可謂得道之門既得道矣則道爲天地之根綿綿若存道體微妙綿綿似不能自持要今古常在用之不勤雖微妙若其應用也未嘗辭倦人能得之則性全神王致無期之壽又言吐納之道也天長地乆今市未始無之天地所以能長且乆者以其不自生故能長生所以長生以其不營養其生而得之是以聖人是能法天地者後其身而身先所以先於人者由善退而致也外其身而身存所以不殆者爲能自薄也非以其無私故能成其私夫能不私於己而私於人人之私未必成而己之私已成矣上善若水至善人如水性水善利萬物物莫不蒙其潤而不爭善委順也處衆人之所惡夫下流者天下之惡歸焉人皆避之水獨處之故幾於道幾近也居善地靜居則善於地心善淵澄心則善於淵與善仁施與則善於仁言善信赴言則善於信政善治爲政則善於理事善能行事則善於能動善時運動則善於時夫惟不爭故無尤尤過也水性若此善人如之是以處無過之地也持而盈之不如其已持滿者鮮能不傾未若止而居中已止也揣而鋭之不可長保磨而至鋭保其不折未之前聞揣磨也鋭薄也金玉滿堂莫之能守賈害者寳積必殺身孰云能守富貴而驕自遺其咎位高而倨患自掇也豈得尤人功成事遂身退天之道夫爲功而功成圖事而事遂則當退身不處亢極是合天道虧盈也載營魄抱一能無離乎人之生也必載魂魂是陽神陽神欲人生魄是陰鬼陰鬼欲人死故老子教人營衛之法不使妄出搆禍也營衛之法無過抱一一專一也抱專一之心魄故無由離身合於前境也專氣致柔能如嬰兒乎能專養和氣至四體之柔弱似嬰兒乎滌除玄覽能無疵乎玄覽心也心靈通雖幽遠亦能覽而知之人皆多欲役之無度遂生瑕穢不能照燭故令以道洗滌除其塵累也愛民治國能無爲乎夫身修者未聞其國不理也民者國之本也無爲者理之要也若得理之要以臨其國是謂愛民而理國也天門開闔能爲雌乎天輔有德而愛民之君守雌用靜動不離道故天門長開授其福祚不者闔矣明白四達能無知乎有至德如日無所不燭能令群下不知之乎生而不有有則下知也爲而不恃恃則非聖人也長而不宰物不知謝生之所也是謂玄德冥運之至三十輻共一轂當其無有車之用厥初爲車則以椎爲輪不三十輻則不可以轉行也車之利用當厢中之無也因其用無以成運動埏埴以爲器當其無有器之用古者爲器則合士而陶之甌盎成焉故有器之用亦藉中無也因其用無節其飲食鑿户牖以爲室當其無有室之用當營窟之時則斬陵阜而爲室鑿户以出入開牖以通明人得居中中無故也因其用無警其凝滯故有之以爲利有形之物資空無以爲利無之以爲用虚無之道託器質而昭用五色令人目盲乆而視之則熒然無見故若盲五音令人耳聾聽之移時則昏然無聞故若聾五味令人口爽咀之不輟則差然無别故若爽馳騁田獵令人心發狂奔逐狐兔困不暇息故若心之發狂也難得之貨令人行妨没命求於重寳無因進德故行妨是以聖人引聖人之行以抑上五者上五者世人皆矻矻營逐曾不知退故以爲腹之義以示之爲腹不爲目目無厭聖人不爲腹知足聖人爲之故去彼取此去目目視外故云彼取腹腹實内故云此寵辱若驚驚辱與寵同則無辱矣貴大患若身貴身與患一則無患矣何謂寵辱尊榮曰寵貶責曰辱寵爲下辱因寵生故辱爲上如汲黯積薪之義得之若驚恐辱將至失之若驚能思過也是謂寵辱若驚可爲寵驚之相似何謂貴大患若身吾所以有大患者爲吾有身貴厚其身則觸途憂患及吾無身吾有何患及不私其身忘其形遂失患之所在故貴以身爲天下若可以寄天下貴身之人爲君必求美服厚味則必竭生人之資人孰不怨共以天下寄之非乆長也故愛以身爲天下若可以託天下驚寵之人爲天下主既愛其身則必防其辱不擾於人人無不親附共以天下託之託之者是抑與之也視之不見名曰夷目可以觀色不可覩道而視之者徒得其夷夷平也爲漠漠然無異見聽之不聞名曰希耳可以聞聲不可以聆道而聽之者但得其希希無也亦少也或終身不得或亦得之搏之不得名曰微手可以執質不可以執道而搏之者只得其微微妙也彷彿似有追之又失此三者不可致詰故混而爲一以上三者將窮於道竟無所得不若混而爲一也其上不皦其下不昧凡物皆上明而下暗唯道高而無上故不皦卑而無下故不昧繩繩不可名復歸於無物繩繩者長遠不絶也及責其實而欲名之則復歸於無物也是謂無狀之狀既不可名信無狀矣而云之狀其故何哉明道雖非其狀誠能生於衆狀故云之狀也無物之象豈如物之形象可得而見是謂惚恍恍有也惚無也謂有不可謂無不可故以惚恍名之迎之不見其首無來時也隨之不見其後無去日也執古之道以御今之有雖非視聽可得又非尋摘所知自古有之謂之曰道今欲執守未聞其方方在虚心心誠能虚道將自至然後執之以御群有無不致理能知古始是謂道紀道爲大古之始人能知而復行是謂得理化之綱紀古之善爲士者說古昔之時有善以道爲士者微妙玄通深不可識獨究至道盡其微妙墻仞高深不可窺測夫唯不可識故强爲之容道在於心不形於色故人不可得識將欲化導故强爲容容以悟物也豫若冬涉川方冬之時堅冰必至而涉川者固無慮於墊溺所以悦豫猶若畏四鄰雖處欲不染如涉冬川猶懼迹生切自韜晦如逃難者恐四鄰知之儼若客其無爲也如客之儼然也涣若冰之將釋復不凝滯如沐之泮也敦兮其若樸又恐流而不反將思復於本者曠兮其若谷如谷虚容渾兮其若濁不獨清也孰能濁以靜之徐清唯善士也孰能安以乆動之徐生不安於安次來次滅善士之道也歸此道者不欲盈盈則失之夫唯不盈故能弊不新成唯不盈者故能弊其所新致虚極守靜篤篤厚也將欲求道集於身者必須先致其虚令虚至極則道必自至於身中矣萬物並作吾以觀其復恐人未信守靜是得道之由故以此喻明之萬物動作吾觀其揺落之後生氣無不歸於靜中也夫物芸芸皆復各歸其根夫物芸芸茂盛至秋秋冬之交生性未有不歸於根者爲根靜故也歸根曰靜若動則不能更生也靜曰復命萬物至十月其氣皆歸於根冬至後乃一陽生方萌芽動也周而復始此自然之本也復命曰常常生之道知常曰明明故知也不知常妄作凶若昧於知常則所動皆妄必不能與吉會也知常容心虚則知常故能容衆也容乃公無所不容爲無私也公乃王無私者物皆歸附也王乃天王道無偏如天之覆天乃道其功莫大又能忘之道乃乆忘公之主福祚敢忌没身不殆愛及甘棠洗其人乎言至人立功立事立言立法萬古不朽身謝而神存也道德眞經新註卷之一
