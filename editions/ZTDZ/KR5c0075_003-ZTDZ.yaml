body:
  text: 李約註德經上凡四十一章上德不德人不見其迹則謂之不德是以有德物不改其樸然後知有德下德不失德慕前王之美恭守而不墜是以無德物性稍移是知無德上德無爲而無以爲不爲而得下德爲之而有以爲爲而得也上仁爲之始化道而爲仁也而無以爲雖爲之而無心上義爲之始化道而爲義而有以爲專於制斷上禮爲之始化道而爲禮而莫之應則攘臂而仍之贈答失所故有斯怒故失道而後德上德合道故云失道下德次之此所以有德有仁有義有禮既失上德則下德繼之失德而後仁下德有失仁教嗣興失仁而後義仁教又替義方遂行失義而後禮是非合宜己謝於時拜跪玉帛將盛於世夫禮者忠信之薄而亂之首亂者君不君臣不臣父不父子不子也忠信者道德也若以禮比於道德誠爲衰薄用救於亂則捨禮何從前識者是先識禮人也道之華禮可以悦人之目是謂道花也古花字今華字是也而愚之始適可爲愚者檢逸之初也是以大丈夫大丈夫者丈夫雄者也丈夫之雄性必方直不徇浮俗故昌言云若大丈夫則必行道德不敦末禮也處其厚不處其薄必致身於道德不置身於衰薄居其實不居其華實如草木之實能實人之腹故居之花如草木之華徒閲人之目故不居也故去彼取此去花而取實昔之得一者在下文也天得一以清地得一以寧谷得一以盈神得一以靈萬物得一以生侯王得一以爲天下貞自天地已降至于侯王所以能清等自得道之一故令侯王正身以正於人故云天下貞貞正也其致之既知得道其致之如是豈得失之哉天無以清將恐裂地無以寧將恐發谷無以盈將恐竭神無以靈將恐歇萬物無以生將恐滅侯王無以貴高將恐蹷蹷顚覆也若得之而不守故其患若此也故貴以賤爲本王貴也民賤也王以民爲本故有民則有王也高以下爲基九仞之山一簣之基若爲基不固山必頽矣將存其貴不安於民則民散而王蹷矣是以侯王自謂孤寡不穀此其以賤爲本耶非乎孤子無父也寡婦無夫也不穀生無養也此三者人之所惡而侯王稱之豈非以賤爲本耶非乎者言正是以賤爲本也故致數輿無輿就輿數之但得輪轅等衆材也則就王數之但得卿士等兆民也若散衆材則無成輿之日不安兆民焉有爲王之時不欲碌碌如玉落落如石碌碌貴貌也落落賤貌也玉雖貴因石而生王雖尊因民而有以此不欲如玉欲如石者敦本故也反者道之動道體寂今也動反也所以反者爲物性之有剛也故設權剛以待之亦冀反其寂也弱者道之用柔弱者道之常用物皆知之今再明者恐因權剛之義便謂道用合然矣天下萬物生於有萬物皆自有形天地而生也有生於無即有形天地自道而生道無也上士聞道勤而行之聞之而悟遂勤行而反本中士聞道若存若亡聞之而疑猶可教也使知道也下士聞道大笑之聞之而惑故大笑則不可使白方也不笑不足以爲道道爲下士入耳之音則不足爲貴建言有之建立也立言明中下二士疑其大笑之由明道若昧行昭而用晦也進道若退内勤而外怠也夷道若纇纇絲之不匀者履平而若險上德若谷無心而善應也大白若辱性潔而迹污也廣德若不足道不形於色也建德若偷才不露於外也質眞若渝至絶反如濫也大方無隅無岸谷可見也大器晚成不日求以得也大音希聲希無也無聲樂也大象無形無狀之狀道隱無名自建言已下皆是大道隱於無名也故上士洞悟而勤行中士疑而進退下士惑而大笑識此之由夫唯道善貸且成道不以三士不同亦均貸和氣皆使生成而勤行者獨還和於道中而疑笑者並乾没於元氣也道生一謂應感而生一氣也一生二一始生陰氣三始生陽氣也二生三三者陰陽相感通而生和氣也三生萬物和氣聚而生萬物也萬物負陰而抱陽冲氣以爲和凡物皮質外周曰負陰皮質陰氣爲也骨髓内充曰抱陽骨體陽氣爲也道氣柔弱貫通其間而和之人之所惡唯孤寡不穀而王公以爲稱王公之和氣柔弱爲萬物本故能以不祥爲稱是以爲天下君故物或損之而益稱不祥誠自損也物無不賔非益而何或益之而損恃貴者己自益也民皆離心非損何也人之所教亦我義教之人欲立教教人者亦當以我柔弱之義教之則服膺者莫不歸於性命之城强梁者不得其死君强暴則失臣不之心覆亡無日人强梁則爲衆所加顚躓可待吾將以爲教父父人之先也吾以柔弱之義爲衆教之先天下之至柔馳騁天下之至堅夫和氣者天下至柔之物也若人馳騁之則化爲天下至堅之物無有入於無間將欲復和氣而爲至柔者但能無有馳騁之志明和氣自入於無間之心化爲至柔之物也吾是以知無爲之有益老子云我見無爲馳騁者則能令和氣長在於心柔弱而長生也所以知無爲有益於人也不言之教無爲之益天下希及之不言於人無爲於己其爲益也天下罕能及此名與身孰親名可捨身不可捨則何者疏也身與貨孰多貨失而可求身亡而難得則何者少也得與亡孰病得則亡身亡則全眞則何者爲利故甚愛必大費欲過於分所損亦重多藏必厚亡積而不散十九而死知足不辱足於心則常榮知止不殆止於分則常安可以長乆必無中道而夭大成若缺德全者故貌如不足也其用不弊其應物也無所不能也大盈若冲内實者故外如虚也其用不窮至於濟衆未嘗竭也大直若屈含垢而不申也大巧若拙不矜其能大辯若訥似不能言躁勝寒物極則反故夏至則一陰生乎其中矣靜勝熱否極則泰故冬至則一陽生乎其中矣清靜爲天下正正者躁靜之中則二月八月也故大成以下至于大辯皆適躁靜之中得天下之正者也天下有道却走馬以糞有道之主嗣庸君之後則必撥亂反正偃武修文是以前王所徵之馬走在道路今我不用却使還家糞理農業天下無道戎馬生於郊無道之君繼清平之後恃以府藏充實遂好攻戰侵人土地所以士不解鞍長在境上罪莫大於可欲於求物之中尚有其數禍莫大於不知足經於目者輒無所捨咎莫甚於欲得見與不見咸欲求之則天下之物靡有孑遺此皆無道之君所行之事故知足之足知止於足則土階茅茨未爲不足常足矣不踰於分貴安人此有道之君也不出户以知天下以身度之天下可知不窺牖以見天道法天而行不必窺牖其出彌遠其知彌少不知民安在於無事反爲事以安之則事出彌遠而民安彌少是以聖人不行而知知民安由己已但無事則民安矣不必行於天下也不見而名守道在位則太階自平豈待窺牖見而明之不爲而成成此至理由乎不爲也向若爲之則無因及此也爲學日益爲學者日益聞見也爲道日損爲道者日損云爲也損之又損一損尚淺再損方深以至於無爲損至於無損乃遊乎環中無爲而無不爲功成不宰是無爲生成萬有是無不爲也取天下常以無事無事無爲不順人之事言與衆同好惡非自取便於身之事也及其有事不足以取天下若取便身之事則煩人人煩則離散安可以取天下也聖人無常心如虚舟之泛然也以百姓心爲心百姓所樂者君爲成之善者吾善之不違其性不善者吾亦善之德善聖人自善身而惡者自化之爲善矣終不役物以從己也信者吾信之不奪其志不信者吾亦信之德信聖人自推誠於天下而人自化之爲信非制之使爲也聖人在天下惵惵焉聖人在天下常惵惵焉軫慮慮會物之不安也爲天下渾其心天下之民欲乎無事故吾渾心同民之欲百姓皆注其耳目百姓皆傾注耳目以觀聽聖人從民之欲否聖人皆孩之聖人念而撫之如赤子寧忍以事擾之出生入死邪妄出於心則生入則死生之徒十有三死之徒十有三内五藏外八使耳目鼻口手足及三漏内外都十三之徒侣也八使馳於外五藏納於内共陷人以至死若以無事各清其司則致人以全生也又云五藏五形三田爲十三頭及四肢爲五形三田黄庭經云上丹田腦也中丹田心脾之間下丹田腎中氣海也人之生動之死地十有三人之求生誙誙然咸投足於死地者亦由十三誘之夫何故問往死地之由以其生生之厚對曰蓋縁過求世物充養太豐是使十三之徒殺人得便也蓋聞善攝生者攝養也善養生者則約彼十三於清靜之中放此一身於忘形之地陸行不遇兕虎兕虎皆猛獸能以爪角傷人我無害物之心故不值此類入軍不被甲兵兵能殘人甲可禦害我無鬥志故不假帶此器兕無所投其角虎無所措其爪兵無所容其刃若專以害物爲心則雖蜂蠆至微不能不以毒中人也而况虎兕等乎苟無傷物之志雖被猛獸利兵又何以加我乎又云兕虎甲兵比類身中貪邪也言清靜無爲則禍患無因而入疾病無由而生也夫何故問免死之由以其無死地十三之徒爲清靜所排不令引五賊三尸入於心地則無死地可入也若失清靜於毫釐則五賊三尸間隙而進得措其角爪刃矣道生之始貸氣也德畜之遂含育也物形之質方具也勢成之四時更生物遂化就是以萬物莫不尊道而貴德物雖至愚未有不知父母而尊貴之道之尊德之貴夫莫之爵而常自然世人之尊貴者爲受帝王錫命也而道德不假於此自有生成之功故爲物所尊貴也故道生之畜之長之育之成之熟之養之覆之有如此力故不假爵命也生而不有有則收其仁也爲而不恃恃則居其功也是謂玄德可謂陰德天下有始始本也萬物資之所以生以爲天下母母養也萬物由之所以成既知其母又知其子以知道之母物爲之子明矣既知其子復守其母既知子由生則知守母以存其子没身不殆道既扶之何危之有塞其兊緘無猒之目也閉其門杜多言之口也終身不勤遂形逸而神王開其兊濟其事民之於欲也甚勤以道防間猶恐其逸况開濟者乎終身不救禍已成矣不可匡救見小曰明造形則悟守柔曰强積弱所致也用其光復歸其明觀守母存子之法得法則收視而守中見小守柔是其法也無遺身殃能不以禍自償是謂襲常可謂潜至長生之道使我介然有知行於大道介孤介也疾時不行正道之道故曰若使我孤介之士有知天下之分則使直道大行於天下唯施是畏唯獨也獨施正直是畏衆邪大道甚夷實君臣之坦途也而人好徑以時人好邪道我權輕不能制朝甚除盛修飾也田甚蕪奪民時也倉甚虚民乏食也服文綵君財豐也帶利劍好戎裝也猒飲食飫珍羞也財貨有餘厚歛得也是謂盜誇不義而得非盜而何曾無作色乃更誇示非道也哉也哉者歎辭也盜已非道况更矜誇誠如斯人實堪興歎善建者不拔善建國立身者必以德以德者則身不危而國不拔拔傾拔也善抱者不脱脱失也夫建國者抱民立身者抱神若皆以德則無脱失也子孫祭祀不輟輟止也善以德建國抱民者則子孫繁昌世世祭祀不輟止時也修之於身其德乃眞以德修身諸僞咸盡修之於家其德乃有餘以德修家慶流後嗣修之於鄉其德乃長以德修鄉日益遠大修之於國其德乃豐以德修國君民充實修之於天下其德乃普以德修於天下則比屋可封化被異域故梯山航海而朝貢焉故以身觀身以家觀家以鄉觀鄉以國觀國以天下觀天下但對觀之則興亡可見吾何以知天下之然以此以上事所以知之也含德之厚比於赤子夫懷德深者性之與狀並如赤子赤子以其始生其色赤故因而名之毒蟲不螫毒蟲者蜂蠆也以尾端肆毒曰螫猛獸不據猛獸虎豹也以爪拏按曰據玃鳥不搏玃鳥雕鶚也以羽距擊觸曰搏含德之士盡喪諸偶全其神故得三者常避之又云三者比身中貪邪毒害也言含德如赤子則貪邪毒害無由干身也骨弱筋柔而握固未知喜怒而權握至堅者性專也未知牝牡之合而䘒作精之至豈識男女之會而陰常勁者精全也終日號而嗌不嗄和之至雖啼之竟日而聲不斯者和之極也知和曰常赤子有此三能者以和之至也而含德之士知之故常存知常曰明能知常存可謂明矣益生曰祥於自然之分加之毫芒則化凶爲祥也心使氣曰强和氣至柔而爲强者由心發怒使之然也物壯則老壯固老之階也是謂不道既不能自老反少則必無全和之道不道早已令止而不爲也知者不言忘言者知之盛也言者不知未知故滯言也塞其兊不要目視閉其門不假口說挫其鋭摧其志也解其紛虚其心也和其光時明則明同其塵時暗則暗是謂玄同無所不同故不可得而親仁不見也不可得而踈迹無污也不可得而利善外物也不可得而害不貪餌也不可得而賤抱道德也故爲天下貴爲人至此始可爲天下至道以政治國用教令者以奇用兵尚詐計也以無事取天下獨無事者取天下人心順而爲帝王與夫二子之爲理豈同日而論哉吾何以知天下之然以此我何以知以政與以奇不足以取天下唯無事者乃能取天下之心而爲之主以下文知也天下多忌諱而民彌貧此說以政之君也禁令繁密民皆慮其抵犯不敢云爲日至貧也民多利器國家滋昏民皆畏死因須挾藏弓矢以衛其生故國家日益昏亂人多伎巧奇物滋起此說以奇之君也志在用兵篤好奇詐兼崇攻守之具則民莫不役智作淫奇之物也法令滋彰盜賊多有法物者則巧極人之所作之物也所作之物出於常情獨懸善价是以多有竊其法式盜其財物由法物滋彰之過也故聖人云我無爲而民自化我但拱默而已而民皆化之我好靜而民自正我但以靜自持而民皆化不爲邪也我無事而民自富我但無事民不失業當自富矣我無欲而民自樸我但無人所爲下者不過欲兼畜小國使爲附庸益其土宇者也小國不過欲入事人所以下意在入事大國欲使他邦不敢興伐也兩者各得其所欲皆遂其志故大者宜爲下偏戒大者恐恃强不爲謙也道者萬物之奥道於萬物之中最深最奥能與庶品爲根本也善人之寳善人之道修身可以長生故用爲寳不善人之所保不善人者是下士也下士曾無向道之心及有禍難則以爲保冀其庇護也美言可以市交易之中能甘辭者出則易集求則易得尊行可以加人行高者始可以教加於人也人之不善何棄之有人無不善但化之不至也故立天子置三公天子萬民之主也欲以其道付之令化不善之人又恐忽其道更置三公以佐之雖有拱璧以先駟馬不如坐進此道三公有大璧先良馬而進之亦忠臣之分然不如坐進此深奥之道於君以集雍熙之化古之所以貴此者何欲發明道妙故設此問不日求以得對曰以其不可一日求而得之當須綿歷年代積功累行而後致之有罪以免耶行成道備之人縱有逆鱗忤㫖之罪亦免誅免責免耶者歎美之辭故爲天下貴以此古今共貴之爲無爲爲生於心爲則心亂事無事事出乎志有事則志昏味無味嘗味者口嗜之則口爽大小多少報怨以德德是上三無也人能行此三德則心必虚明虚明則能見怨之初起起於小小而能絶之則無大矣起於少少而能除之則無多矣如此報之則何怨之有怨是亂昏爽也圖難於易小則易也爲大於細少是細也天下難事必作於易天下大事必作於細此必然之理善圖爲者在兆朕之時也是以聖人終不爲大愼微之至故能成其大由是成乎聖人夫輕諾必寡信夫存誠者必重其所許也多易必多難不圖其終者故每事爲易是以聖人猶難之愼厥始也故終無難爲難於初故易於末其安易持其未兆易謀防之於未然故易也其脆易破故其微易散於始生之時則除之故不難也爲之於未有治之於未亂是居存慮没之士也合抱之木生於毫末大不可除九層之臺起於累土高不可掩千里之行始於足下遠不可止爲者敗之爲者是除禍胎任其滋長使至成熟故謂之敗敗猶可循復也執者失之執者由長惡不悛遂至絶滅故謂之失失者無復更生也聖人無爲故無敗敗起於爲不爲何敗無執故無失失因於執不執何失民之從事常於幾成而敗之皆有始而無卒愼終如始則無敗事本末不衰則無不成是以聖人欲不欲不貴難得之貨欲人之所不欲故視金玉如遺土也學不學以復衆人之所過學人之所不學故能抑群生之踰分以輔萬物之自然爲此二行者以佐萬物之性咸使歸於天眞不敢爲焉守愼故不敢妄爲也古之善爲道者說古有道者欲使今世之君效之非以明民不以道明示於民者恐其生異志也將以愚之潜以道浸潤令反其質朴民之難治以其智多姦智多則懷巧詆是以難理故以智治國國之賊使多智者治國則必行蠹政則民亂矣故是國之賊也不以智治國國之福若以淳樸爲政則必行無爲則民安故是國之福也知此兩者亦楷式楷模也式法也爲賊爲福是兩者兩者亦甚易知知之則當違害而就利常知楷式是謂玄德常知福可任之賊可去之致蒼生於太平是君有不測之德玄德深矣遠矣與物反矣陰德深不可知遠不可窺夫然乃能與萬物復歸於自然之性然後乃至大順皆復天眞則無所不順也江海所以能爲百谷王者以其善下之故能爲百谷王王者往也江海善居衆流之下是以百谷無不臻凑是以聖人是能法江海者欲上人必以言下之將欲居於人上故先以其言下於人欲先人必以其身後之將欲居於人先故須退身在於人後也是以處上而人不重民皆欣戴猶以爲輕處前而人不害人皆悅隨焉無加傷是以樂推而不厭謙之力也以其不爭故天下莫能與之爭我以謙德化下下皆化之而爲退讓也天下皆謂我道大似不肖天下之人皆言我道大似不賢者夫唯大故似不肖我則語之夫大人故其愚不可及也若肖乆矣其細也夫若賢使人得之者此乃爲天下至細之人乆矣吾有三寳我雖不肖然有三行可謂修身理國之至寳也寳而持之人若以爲寳持之不捨則何往而不利一曰慈慈仁也二曰儉儉約也三曰不敢爲天下先處群動之後也夫慈故能勇勇於濟物儉故能廣節用故有此贍不敢爲天下先故能成其長自下行成昇高業就故得爲天下君長堯爲九州長是也今捨其慈且勇不仁而勇勇必損物捨其儉且廣不約反奢必見之捨其後且先先己而後人人必銜怨死矣此三行或闕其一則死矣况皆不行乎夫慈以戰則勝以守則固將能用慈撫養士卒士卒心無貳故戰則勝守則固天將救之以慈衛之慈德動天天故救助以其將能用慈衛於士卒也善爲士者不武以道不以武也喜戰者不怒以謀不以怒也善勝敵者不爭以德不以爭也善用人者爲之下以謙不以力也是謂不爭之德是謂用人之力是謂配天古之極上四善人能行之則未有不應也其如此故得上合天道是古之極致者也用兵有言因時君所好而進其道用兵之言在下文吾不敢爲主主先物而動而爲客客和而不唱不敢進寸不擅侵人而退尺自守以候變也是謂行無行敵宼我封遂行以止之非懷殺伐之志攘無臂無怒不攘故似無臂仍無敵不爭勝故不引鬥也執無兵以德不以力也禍莫大於輕敵夫爲客之道莫先於是舉輕敵則幾喪吾寳寳身也若輕敵深入靡不輿尸故抗兵相加則哀者勝之兩國舉兵主客勢敵至於交鋒剋捷則素慈哀於士卒者勝也此是因用兵進以慈之道也吾言甚易知甚易行云我言無爲則易知將欲行之又何難矣天下莫能知莫能行天下擾擾皆徇有爲有爲與無爲背故皆不能行言有宗事有君以道爲宗以德爲君夫唯無知是以不我知無知者是識不及理人之不能知我至言行我無爲則道德何由至哉知我者希舉世少有能知我有道德者則我者貴知而法之貴無以比是以聖人被褐懷玉内有至寳外無光儀是以天下莫能知也知不知上智周萬物無所不知而云我何知此眞知也得非上乎不知知病墻面而立一無所知而云無所不知斯妄人也豈非病矣夫唯病病是以不病眞知者乃能以妄知爲病而病之則眞知不病而妄知病矣聖人不病以其病病向若自病則不能病人也是以不病驗此則不病明矣人不畏威則大威至威之大者死也人皆以小惡爲無傷遂積之盈貫貫盈而死是非大威至乎無狹其所居居神者心也多欲則神居狹矣無厭其所生生人者神也神留則不死夫唯不厭是以不厭若能清虚則人神相愛也是以聖人自知自知虚心則神留不自見若自見則是不畏威自厭不厭生也不自貴若自貴則是狹其居故去彼取此去自見與自貴取自知與自愛勇於敢則殺若勇敢於欲則天必殺之勇於不敢則活若於欲勇於不敢則天必活之常知此兩者謂敢與不敢也或利或害不敢則爲利敢則爲害也天之所惡孰知其故天惡勇敢是以聖人猶難之斯縁知天之所惡天之道說天道以誡於人也不爭而善勝天雖順物物孰敢不聽命也不言而善應雖無言教四時百物無不應之不召而自來雖不呼召三光列耀莫不隨之繟然而善謀繟然至寬至於殺敢活不敢未嘗匱乏畫夜行度未始差忒若然者如其中有善運籌之主也天網恢恢疏而不失雖網目至疏大而爲惡者不能脱免民常不畏死已困於刑法也奈何以死懼之更以死刑威之豈有畏者若使民常畏死時政寬則民不輕生而爲奇者吾得執而殺之孰敢於畏死之中有民爲詐抵法以吾君人之勢必得執而殺之所不敢者不敢代天也常有司殺者殺所以無漏網者夫代司殺是謂代大匠斲以君代天如拙夫之代良三也夫代大匠斲希有不傷其手矣以不能代能則不唯殘朴亦必傷手民之饑以其上食税之多是以饑上厚斂則下不足是以饑民之難治以其上之有爲是以難治上多事則下皆設奇以應之是以難理人之輕死以其求生之厚是以輕死此言人屬在君也上貪營養太豐誅求過分國民十室九空民咸怨上上遂覆亡是非輕死也夫唯無以生爲者是賢於貴生厚生則生亡外生則生存以此較之則不貴生者賢於貴生者也人之生也柔弱道在也其死也堅强道去也萬物草木之生也柔脆氣在也其死也枯槁氣散也故堅强者死之徒柔弱者生之徒目擊可知是以兵强則不勝兵者不祥之器違天天之好生故抑之使强者不勝也木强則共木本强大而條柯柔弱故柔條共生於强本也强大處下柔弱處上以生死並之柔生而强死以上比之又弱居上而强處下彼區區自爲下而取死倒置何深天之道其猶張弓乎以人所解喻天道難知則雖遠可見高者抑之下者舉之有餘者損之不足者與之抑高舉下損長與短張弓如此始可命中天之道損有餘補不足日中則昃損也月晦則朔補也朔蘇也人之道則不然人道與天道背此人之道言暗君俗人也損不足以奉有餘則割無以資有孰能以有餘以奉天下唯有道者誰能同天唯有道之人爲君則遏强撫弱爲人則以財賑乏此言賢君哲士也是以聖人爲而不恃功成不處其不欲見賢不伐其美不處其德者蓋不欲令物見己之賢也天下柔弱莫過於水觀其隨器順人孰能先之而攻堅强者莫之能勝其無以易之攻堅之勝水有不易之道柔勝剛弱勝强天下莫不知莫能行水能攻堅則知柔勝剛謙爲人伏則知弱勝强此天下無不知見至於行之則盡莫能者故聖人言受國之垢是謂社稷主人所惡者垢穢聖人能受之故爲社稷主也受國不祥是謂天下王人所忌者不祥聖人能稱之故爲天下王也正言若反能行柔弱者則爲主爲王此實正言也而俗尚剛强故以爲反和大怨怨者心氣不平也和使其無事也必有餘怨若以事和之則翻濟其怨安可以爲善若翻濟其怨則自然爲惡也是以聖人執左契不責於人凡左非用事之所也契者符會之目也聖人執心無事但思與萬民心氣符同適自無怨何必責於人也故有德司契若善和冤者但司與人民會同而已無德司散若閑和怨者則專司事以明示於民怨是用生豈云和矣徹明也天道無親常與善人有德之主善人也天道常以福祚與之小國寡民理大如小意在簡省貴欲安民也使有什伯之器而不用什物也伯成數也器民之所用生資也由君無爲使民有此資業雖數至於百亦不税而用之使民重死樂業故不輕生也而不遠徙爲無苛政雖有舟輿無所乗之舟可以濟於水輿可以行於陸民既各足故無所乗之雖有甲兵無所陳之甲兵皆君之利器也無爲故無所陳之使民復結繩而用之將反古也甘其食知足故所食皆甘美其服止於分故無服不美安其居欲絶故陋巷斯安也樂其俗無事故其俗自樂也鄰國相望雞犬之聲相聞相去近也民至老死不相往來無所求也信言不美信言者說道也淡乎其無味故不美美言不信美言者誘人也甘言故無信善者不辯善者貴行不事談說辯者不善滯言不行故非善也知者不博知者貴無事也博者不知猶貴學固未知聖人不積積而能散既以與人己愈有演德以教人人受其益而聖德益明如鏡照人人見其好惡惡者修飾好者加勸而鏡明不减既以與人己愈多散財以卹貧貧獲其濟而聖財不匱如井任民汲引汲者蒙其利而井不竭也天之道利而不害天道陽也故好生而惡殺好生故云利惡殺故云不害聖人之道爲而不爭聖人所爲常順於物物無不敬從也道德眞經新註卷之四
