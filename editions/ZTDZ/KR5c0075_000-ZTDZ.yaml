front:
  text: 道德眞經新註序能一自然之道靜故天地萬物生於其中人爲萬物之主故與天地爲三才焉老君在西周之日故秉道德以救時俗道者清淨自然之道也德者以法乆而失修而得之謂之德也故曰道大天大地大王亦大是謂域中四大焉蓋王者法地法天法道之三自然妙理而理天下也天下得之而安故謂之德凡言人屬者耳故曰人法地地法天天法道道法自然言法上三大之自然理也其義云法地地如
  hash: sha256:c3059518d42c7a0d53ed2064a620ea0d86017bfa6d3e307cc26f81abbbc7e9f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0075_SJB_000-120322b, image: sjb/12/120322b.png}
body:
  text: 地之無私載法天天如天之無私覆法道道如道之無私生成而已矣如君君臣臣父父子子之例也後之學者不得聖人之㫖謬妄相傳凡二十家註義皆云人法地地法天天法道道法自然即域中五大矣與經文乖謬而失教之意也豈王者只得法地而不得法天法道乎又况地法天天法道道法自然義理疏遠矣源流既撓支派遂昏或宗之爲神仙書或語之以虚無學論者非云先黄老而後六經乃淺俗之談也殊不知六經乃黄老之枝葉爾余少得㫖要故辯而釋之蓋清心養氣安家保國之術也
  hash: sha256:30e9db918d0ce7b61ed7a59921ac5cfd27119b42ef9d104dfbd1f03c4ded5887
